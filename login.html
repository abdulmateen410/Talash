<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — TALASH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0e27;
  --bg-secondary: #151932;
  --accent-1: #667eea;
  --accent-2: #764ba2;
  --accent-3: #f093fb;
  --accent-4: #4facfe;
  --text-primary: #ffffff;
  --text-secondary: rgba(255,255,255,0.7);
  --text-muted: rgba(255,255,255,0.5);
  --error: #ef4444;
  --success: #10b981;
}
<!--Formation -->
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Animated gradient background */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(circle at 20% 30%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(118, 75, 162, 0.15) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(79, 172, 254, 0.1) 0%, transparent 70%);
  z-index: 0;
}

/* Floating orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.3;
  z-index: 0;
}

.orb1 {
  width: 400px;
  height: 400px;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  top: -10%;
  left: -10%;
}

.orb2 {
  width: 350px;
  height: 350px;
  background: linear-gradient(135deg, var(--accent-3), var(--accent-4));
  bottom: -10%;
  right: -10%;
}

.orb3 {
  width: 300px;
  height: 300px;
  background: linear-gradient(135deg, var(--accent-4), var(--accent-1));
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.login-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
  padding: 20px;
}

.glass-card {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 24px;
  padding: 48px 40px;
  box-shadow: 
    0 8px 32px 0 rgba(0, 0, 0, 0.37),
    inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
}

.logo-section {
  text-align: center;
  margin-bottom: 40px;
}

.logo {
  font-size: 36px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}

.logo-subtitle {
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 32px;
  background: rgba(255, 255, 255, 0.03);
  padding: 4px;
  border-radius: 12px;
}

.tab {
  flex: 1;
  padding: 12px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.3s ease;
}

.tab:hover {
  color: var(--text-secondary);
}

.tab.active {
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  color: white;
  box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
}

.form-section {
  display: none;
}

.form-section.active {
  display: block;
}

.input-group {
  margin-bottom: 20px;
}

.input-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.input-field {
  width: 100%;
  padding: 14px 16px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  color: var(--text-primary);
  font-size: 15px;
  font-family: inherit;
  transition: all 0.3s ease;
  outline: none;
}

.input-field:focus {
  background: rgba(255, 255, 255, 0.08);
  border-color: var(--accent-1);
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.input-field::placeholder {
  color: var(--text-muted);
}

.btn-submit {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 8px;
  box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
}

.btn-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(102, 126, 234, 0.4);
}

.btn-submit:active {
  transform: translateY(0);
}

.btn-submit:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.alert {
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 13px;
  margin-bottom: 20px;
  border: 1px solid;
  display: none;
}

.alert.error {
  background: rgba(239, 68, 68, 0.1);
  border-color: rgba(239, 68, 68, 0.3);
  color: #fca5a5;
}

.alert.success {
  background: rgba(16, 185, 129, 0.1);
  border-color: rgba(16, 185, 129, 0.3);
  color: #6ee7b7;
}

.footer-text {
  text-align: center;
  margin-top: 32px;
  color: var(--text-muted);
  font-size: 12px;
}

/* Loading state */
.loading {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="login-container">
  <div class="glass-card">
    <div class="logo-section">
      <div class="logo">TALASH</div>
      <div class="logo-subtitle">Smart HR System</div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div id="alertBox" class="alert"></div>

    <!-- LOGIN FORM -->
    <div id="loginForm" class="form-section active">
      <div class="input-group">
        <label class="input-label">Username</label>
        <input type="text" class="input-field" id="loginUsername" 
               placeholder="Enter your username" autocomplete="username">
      </div>
      <div class="input-group">
        <label class="input-label">Password</label>
        <input type="password" class="input-field" id="loginPassword" 
               placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button class="btn-submit" onclick="handleLogin()" id="loginBtn">
        Sign In
      </button>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupForm" class="form-section">
      <div class="input-group">
        <label class="input-label">Username</label>
        <input type="text" class="input-field" id="signupUsername" 
               placeholder="Choose a username" autocomplete="username">
      </div>
      <div class="input-group">
        <label class="input-label">Display Name</label>
        <input type="text" class="input-field" id="signupDisplay" 
               placeholder="Your full name">
      </div>
      <div class="input-group">
        <label class="input-label">Password</label>
        <input type="password" class="input-field" id="signupPassword" 
               placeholder="Create a password (min 6 chars)" autocomplete="new-password">
      </div>
      <button class="btn-submit" onclick="handleSignup()" id="signupBtn">
        Create Account
      </button>
    </div>

    <div class="footer-text">
      CS 417: Large Language Models &mdash; Spring 2026
    </div>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
  
  if (tab === 'login') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('loginForm').classList.add('active');
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('signupForm').classList.add('active');
  }
  
  hideAlert();
}

function showAlert(msg, type = 'error') {
  const box = document.getElementById('alertBox');
  box.textContent = msg;
  box.className = `alert ${type}`;
  box.style.display = 'block';
}

function hideAlert() {
  document.getElementById('alertBox').style.display = 'none';
}

async function handleLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  
  if (!username || !password) {
    showAlert('Please enter username and password');
    return;
  }
  
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>';
  
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await res.json();
    
    if (res.ok) {
      showAlert('Login successful! Redirecting...', 'success');
      setTimeout(() => window.location.href = '/', 1000);
    } else {
      showAlert(data.error || 'Login failed');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch (err) {
    showAlert('Connection error. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

async function handleSignup() {
  const username = document.getElementById('signupUsername').value.trim();
  const display = document.getElementById('signupDisplay').value.trim();
  const password = document.getElementById('signupPassword').value;
  
  if (!username || !password) {
    showAlert('Please fill in all fields');
    return;
  }
  
  const btn = document.getElementById('signupBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>';
  
  try {
    const res = await fetch('/api/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, display })
    });
    
    const data = await res.json();
    
    if (res.ok) {
      showAlert('Account created! Redirecting...', 'success');
      setTimeout(() => window.location.href = '/', 1000);
    } else {
      showAlert(data.error || 'Signup failed');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  } catch (err) {
    showAlert('Connection error. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}

// Enter key handlers
document.getElementById('loginPassword').addEventListener('keyup', (e) => {
  if (e.key === 'Enter') handleLogin();
});

document.getElementById('signupPassword').addEventListener('keyup', (e) => {
  if (e.key === 'Enter') handleSignup();
});
</script>

</body>
</html>
